name: Docker Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write

# Publishes ghcr.io/edgy-solutions/openddil/logistics-sim:latest, which the
# openddil-helm chart's logisticsSim.image refers to. Same flow the other
# openddil-* Python services use (cm-service, asset-registry-service,
# logistics-fusion-service). `${{ github.repository_owner }}` resolves to
# the owning org/user so the workflow stays portable across forks.

jobs:
  build-logistics-sim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build logistics-sim
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/openddil/logistics-sim:latest
