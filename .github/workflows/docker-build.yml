name: Docker Build

on:
  push:
    branches: [ "master" ]
    # Also fire on annotated tags (v1.0.0, v1.1.0, ...) so a release
    # cut publishes a versioned image (:v1.0.0) alongside :latest.
    # values-pinned.yaml + the mirror script can then resolve the tag
    # to a fixed digest for reproducible deploys.
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]
  # Manual trigger for re-running a build without a code change (e.g.
  # registry hiccup, or wanting to re-publish :latest at the current
  # HEAD).
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Publishes ghcr.io/edgy-solutions/openddil/logistics-sim:latest, which the
# openddil-helm chart's logisticsSim.image refers to. Same flow the other
# openddil-* Python services use (cm-service, asset-registry-service,
# logistics-fusion-service). `${{ github.repository_owner }}` resolves to
# the owning org/user so the workflow stays portable across forks.

jobs:
  build-logistics-sim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Always publish :latest. On a v* tag push, ALSO publish the
      # tag-versioned image (e.g. :v1.0.0) so downstream consumers can
      # pin to a specific release.
      - name: Compute image tags
        id: tags
        run: |
          REG=ghcr.io/${{ github.repository_owner }}/openddil/logistics-sim
          T="$REG:latest"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            T="$T,$REG:${{ github.ref_name }}"
          fi
          echo "tags=$T" >> "$GITHUB_OUTPUT"

      - name: Build logistics-sim
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
