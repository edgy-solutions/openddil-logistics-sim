# =============================================================================
# logistics-sim default config -- multi-profile
# =============================================================================
# Each entry in asset_profiles[] declares one asset TYPE the sim knows
# how to populate. Add LTAMDS / Patriot / sonar arrays / whatever by
# appending another profile -- no code change. A discovered asset
# routes to the FIRST profile whose matches_platform_variants list
# includes its platform_variant.
#
# Per-profile layout MUST mirror the matching frontend
# SensorArrayView config (MRAD_CONFIG, future LTAMDS_CONFIG, etc.) --
# the element_id format is shared and the frontend's liveTelemetry
# lookup misses if the cardinality drifts.
# =============================================================================

# How often to publish per-asset snapshots, seconds.
tick_interval_s: 30

# Output topic on HQ broker. Generic asset-element-telemetry so future
# profile additions don't fork the topic per asset type -- one consumer
# (the projector) handles them all uniformly.
output_topic: asset-element-telemetry

# Which PowerState / HealthState enum values count as "asset is
# degraded" for synthesis. Defaults err toward "show as degraded if
# in doubt" -- the maintainer demo wants the broken-element visual
# to fire on any non-nominal state. List name values from the proto
# enums in openddil/telemetry/v1/telemetry.proto.
degraded_power_states:
  - POWER_STATE_OFF
  - POWER_STATE_SHUTTING_DOWN
  - POWER_STATE_MAINTENANCE
degraded_health_states:
  - HEALTH_STATE_DEGRADED
  - HEALTH_STATE_FAULT
  - HEALTH_STATE_FAILED

asset_profiles:
  # ---- MRAD --------------------------------------------------------------
  # Single-face Multi-Mission Radar. Layout mirrors frontend MRAD_CONFIG.
  # The MRAD profile models the SENSOR subsystem -- the multi-element
  # array inside an MRAD radar. After the 2026-06-24 per-site sensor
  # identity fix in the customer-bundle Bloblang, a single radar site
  # produces TWO OpenDDIL assets:
  #   * `prop:..._radar` (the chassis Unit, variant=MRAD_Sensor via
  #     alias from MRAD_Radar)
  #   * `prop:..._radar_MRAD_Sensor` (the sensor subsystem, variant=
  #     MRAD_Sensor natively)
  # Only the SENSOR has the array. The chassis is a platform that
  # carries the sensor but has no per-element subsystem of its own.
  # `match_asset_id_suffix: _Sensor` keeps the chassis (and any other
  # variant=MRAD_Sensor asset without the suffix) out of discovery,
  # so the sim doesn't waste cycles synthesizing per-element trees
  # for things that don't have arrays. The frontend's DiagnosticCanvas
  # applies the same gate for the multi-array 3D view (only routes
  # to SensorArrayView when assetId.endsWith('_Sensor')).
  #
  # MRAD_Interceptor (launchers) intentionally absent from matches --
  # launchers are kinetic effectors, not sensor subsystems, no array
  # to synthesize for. They render via SCHEMATIC_REGISTRY's
  # ArtillerySchematic in the maintainer 3D view; their TelemetryCharts
  # panel falls back to the empty state (truthful: no sustainment, no
  # synthesizable subsystem).
  - name: mrad
    matches_platform_variants:
      - MRAD_Sensor
      - MRAD_Radar    # aliases to MRAD_Sensor at ingress; kept for safety
      - MRAD2_radar   # customer-overlay specific variant token
    match_asset_id_suffix: "_Sensor"
    # IMPORTANT: cols×rows MUST match the frontend's MRAD_CONFIG.layers
    # in openddil-demo/frontend/src/components/SensorArrayView.tsx — the
    # path-encoded element ids (TR-.../BOARD-i-j/MODULE-i-j/CHIP-i-j)
    # only resolve when both sides agree on the grid. Tree cardinality
    # history:
    #   23,712 (96 × 6×4×9) — 5MB serialized, current. Restored after
    #                          a visual quality pass -- the trimmed-
    #                          down 4,080 tree looked sparse compared
    #                          to the original dense grid + pulse
    #                          animation.
    #    8,160 (96 × 4×4×4) — 1.6MB, intermediate trim.
    #    4,080 (48 × 4×4×4) — 0.8MB, deepest trim. WebGL holds context
    #                          on Intel UHD-class hardware with this
    #                          plus frameloop=demand. Use this if the
    #                          target deployment has integrated-GPU
    #                          clients that can't hold context.
    # Topic asset-element-telemetry needs max.message.bytes=16MB
    # (see openddil-helm infrastructure.yaml + flush-assets.sh
    # TOPIC_SPECS) to admit the 5MB serialized snapshot at 23,712.
    layers:
      - name: RADAR UNIT
        prefix: TR
      - name: BACKPLANE
        prefix: BOARD
        cols: 2
        rows: 3
      - name: PROCESSOR BANK
        prefix: MODULE
        cols: 2
        rows: 2
      - name: GAN MMIC CHIP
        prefix: CHIP
        cols: 3
        rows: 3
    faces:
      - name: PRIMARY APERTURE
        cols: 8
        rows: 12
    synthesis:
      health_nominal_min: 0.55
      health_nominal_max: 0.85

      # Per-tier yellow/red fractions of FACE elements that lift into
      # the >0.90 (yellow) and >0.97 (red) health bands. Subtree
      # children inherit via the rollup cap, so an elevated face cell's
      # 64 descendants share its tier visually. Mapping from upstream
      # asset state to tier:
      #
      #   NOMINAL  (health NOMINAL + power ON)                → no lift
      #   DEGRADED (health DEGRADED, or power MAINTENANCE)    → yellow only
      #   FAULT    (health FAULT, or tx+rx both off)          → yellow + small red
      #   FAILED   (health FAILED, or power OFF/SHUTTING_DOWN)→ heavier mix
      #
      # Tuned so the demo narrative reads cleanly:
      #   * NOMINAL asset → operator sees an all-green array
      #   * DEGRADED → "a few minor faults, still operational"
      #   * FAULT → "real problems, mission-impacted"
      #   * FAILED → "asset is down, half the array is bad"
      degraded_yellow_fraction: 0.15
      degraded_red_fraction:    0.00
      fault_yellow_fraction:    0.20
      fault_red_fraction:       0.05
      failed_yellow_fraction:   0.30
      failed_red_fraction:      0.20

      # Legacy single-fraction knob -- kept so older configs still
      # load. New deployments should use the per-tier fields above;
      # this fallback is only honored when NONE of the tier_*_fraction
      # fields are set (loader collapses across tiers in that case,
      # matching pre-2026-06-24 behavior).
      degraded_fraction: 0.15

      temp_min: 30
      temp_max: 75
      load_min: 5
      load_max: 95
      tick_drift_temp: 1.5
      tick_drift_load: 5.0

  # Future profiles land below as additional entries. Example template:
  #
  # - name: ltamds
  #   matches_platform_variants:
  #     - LTAMDS_Sensor
  #     - LTAMDS_Radar
  #   layers:
  #     - name: RADAR UNIT
  #       prefix: TR
  #     ...
  #   faces:
  #     - name: PRIMARY NORTH
  #       cols: 8
  #       rows: 14
  #     - name: SECTOR ALPHA
  #       cols: 5
  #       rows: 8
  #     - name: SECTOR BETA
  #       cols: 5
  #       rows: 8
  #   synthesis:
  #     ...
